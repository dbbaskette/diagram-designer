spring:
  application:
    name: diagram-designer-api
  datasource:
    url: jdbc:sqlite:./diagrams.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.sqlite.hibernate.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    locations: classpath:db/migration/sqlite
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.diagramdesigner: ${LOG_LEVEL:INFO}
    org.springframework.web.reactive.function.client: ${HTTP_CLIENT_LOG_LEVEL:WARN}
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Metrics Proxy Configuration
metrics:
  proxy:
    timeout-ms: ${PROXY_TIMEOUT_MS:10000}
    enable-caching: ${ENABLE_CACHING:true}
    cache-ttl-ms: ${CACHE_TTL_MS:30000}
    cache-max-size: ${CACHE_MAX_SIZE:256}

    # Authentication configurations are now dynamic
    # The service will read environment variables and match them to URLs
    # Pattern: <SERVICE_NAME>_USERNAME, <SERVICE_NAME>_PASSWORD, <SERVICE_NAME>_API_KEY, etc.

# Cache Configuration (diagram config and service discovery caches)
cache:
  diagram:
    max-size: ${DIAGRAM_CACHE_MAX_SIZE:64}
    ttl-seconds: ${DIAGRAM_CACHE_TTL_SECONDS:600}
  service-discovery:
    max-size: ${SERVICE_DISCOVERY_CACHE_MAX_SIZE:128}
    ttl-seconds: ${SERVICE_DISCOVERY_CACHE_TTL_SECONDS:300}

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev

server:
  port: 3001

logging:
  level:
    com.example.diagramdesigner: DEBUG
    org.springframework.web.reactive.function.client: DEBUG

metrics:
  proxy:
    enable-caching: false

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.example.diagramdesigner: INFO

metrics:
  proxy:
    timeout-ms: 5000
    cache-ttl-ms: 60000

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

---
# Cloud Foundry profile (PostgreSQL via service binding)
# java-cfenv-boot auto-configures datasource from VCAP_SERVICES when a database service is bound
spring:
  config:
    activate:
      on-profile: cf
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  flyway:
    locations: classpath:db/migration/postgresql

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false